name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite
        # GROMACS is not installed on CI, so the gmx grompp test skips cleanly.
        run: pytest -q
